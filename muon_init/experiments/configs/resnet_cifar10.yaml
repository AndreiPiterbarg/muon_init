# Small ResNet-18 on CIFAR-10
# ~270K params, ~5 min/run, MODERATE init sensitivity
# Skip connections + BatchNorm dampen init effects.

model:
  name: small_resnet18
  num_classes: 10
  widths: [16, 32, 64, 128]

data:
  name: cifar10_augmented
  batch_size: 128

training:
  total_steps: 10000
  warmup_steps: 500
  lr_muon: 0.02
  lr_adam: 0.0003
  momentum: 0.95
  weight_decay_muon: 0.0
  weight_decay_adam: 0.0005
  eval_every: 1000
  log_every: 200

init: kaiming_normal
use_muon: true
seed: 42
