# NanoGPT on OpenWebText
# ~10M params, ~45 min/run, MOD-HIGH init sensitivity
# The Muon community benchmark. Mixed optimizer regime.

model:
  name: nanogpt
  vocab_size: 50257  # GPT-2 BPE
  block_size: 1024
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.0

data:
  name: openwebtext
  batch_size: 32
  block_size: 1024
  max_tokens: 50000000

training:
  total_steps: 10000
  warmup_steps: 1000
  lr_muon: 0.02
  lr_adam: 0.0003
  momentum: 0.95
  weight_decay_muon: 0.0
  weight_decay_adam: 0.1
  eval_every: 1000
  log_every: 100

init: kaiming_normal
use_muon: true
seed: 42
