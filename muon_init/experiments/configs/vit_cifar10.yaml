# ViT-Tiny on CIFAR-10
# ~1.2M params, ~8 min/run, MOD-HIGH init sensitivity
# Encoder-only Transformer on small data — fragile and init-sensitive.

model:
  name: vit_tiny
  img_size: 32
  patch_size: 4
  in_channels: 3
  num_classes: 10
  n_layer: 6
  n_head: 4
  embed_dim: 192
  dropout: 0.0

data:
  name: cifar10_augmented
  batch_size: 128

training:
  total_steps: 10000
  warmup_steps: 500
  lr_muon: 0.02
  lr_adam: 0.0003
  momentum: 0.95
  weight_decay_muon: 0.0
  weight_decay_adam: 0.05
  eval_every: 1000
  log_every: 200

init: kaiming_normal
use_muon: true
seed: 42
