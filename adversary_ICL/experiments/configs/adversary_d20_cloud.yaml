# d=20 adversarial search on cloud GPU
# Usage: python -m src.adversary.run --config experiments/configs/adversary_d20_cloud.yaml

icl_model:
  run_path: "results/checkpoints/d20_12layer_500k"
  step: -1  # latest checkpoint

task:
  name: "noisy_linear_regression"
  n_dims: 20
  n_points: 41

genome:
  type: "pipeline"
  n_stages: 8

# Start with lambda=0 to see what the adversary finds unconstrained at d=20
# Tune lambda separately after initial results
parsimony:
  lambda: 0.0
  c_base: 1.0
  c_stage: 1.0
  c_affine: 1.0

search:
  budget: 200000
  pop_size: 64
  sigma_init: 0.3
  num_restarts: 10
  seed: 0
  save_interval: 50

eval:
  batch_size: 64
  num_batches: 10
  baselines:
    - "ridge"
    - "least_squares"
    - "averaging"

diagnostics:
  enabled: true
  top_k: 5
  run:
    - "learning_curve"
    - "algorithm_id"
    - "weight_recovery"
    - "attention"
    - "linear_probing"
    - "gradient_attribution"
    - "pipeline_ablation"

output:
  save_dir: "results/adversary_runs/d20_pipeline"
