# 1-layer LSTM baseline (Section 4, R2).
# ~133K params, extrapolates perfectly with ~20x fewer samples than the Transformer.

model:
  family: lstm
  vocab_size: 5
  hidden_size: 128
  num_layers: 1

data:
  seq_len: 512
  train_p_i: 0.8
  eval_in_p_i: 0.8
  eval_sparse_p_i: 0.98
  eval_dense_p_i: 0.1
  eval_in_n: 1000
  eval_sparse_n: 100000
  eval_dense_n: 3000
  eval_seed: 1

training:
  lr: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.999
  warmup_steps: 50
  train_steps: 500            # paper: 20x fewer steps than the Transformer
  decay_end_step: 501
  batch_size: 16
  grad_clip: 1.0
  seed: 0
  eval_every: 100
  training_eval_subset: 1000
  log_every: 10
  save_every: 0
  eval_batch_size: 64
  device: auto

output:
  out_dir: results/flip_flop/lstm
