# Tier-A retrain on BitMarkov adversary findings.
# Continues training the baseline FFLM on a 70/30 mix of FFL(0.8) and the
# axis-floor families extracted from the adversary log.

retrain:
  base_p_i: 0.8
  replay_frac: 0.7
  init_from_ckpt: results/flip_flop/baseline/model_final.pt
  family_sources:
    - log: results/flip_flop/adversary/bitmarkov/adversary_log.jsonl
      top_k: 5

model:
  family: gpt2
  vocab_size: 5
  n_positions: 512
  n_embd: 512
  n_layer: 6
  n_head: 8
  resid_pdrop: 0.0
  embd_pdrop: 0.0
  attn_pdrop: 0.0

data:
  seq_len: 512
  train_p_i: 0.8
  eval_in_p_i: 0.8
  eval_sparse_p_i: 0.98
  eval_dense_p_i: 0.1
  eval_in_n: 1000
  eval_sparse_n: 10000
  eval_dense_n: 3000
  eval_seed: 1

training:
  lr: 3.0e-5
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.999
  warmup_steps: 100
  train_steps: 2000
  decay_end_step: 2001
  batch_size: 16
  grad_clip: 1.0
  seed: 0
  eval_every: 500
  training_eval_subset: 1000
  log_every: 50
  save_every: 1000
  eval_batch_size: 64
  device: auto

output:
  out_dir: results/flip_flop/retrain/tierA_bitmarkov
