# Canonical baseline Transformer FFLM.
# Matches Liu et al. 2023, Section 4 (bolded-box 6L / 512d / 8H, 19M params).

model:
  family: gpt2
  vocab_size: 5
  n_positions: 512
  n_embd: 512
  n_layer: 6
  n_head: 8
  resid_pdrop: 0.0
  embd_pdrop: 0.0
  attn_pdrop: 0.0

data:
  seq_len: 512
  train_p_i: 0.8              # FFL(0.8): p_w = p_r = 0.1, p_i = 0.8
  eval_in_p_i: 0.8
  eval_sparse_p_i: 0.98       # long-range / sparse tail
  eval_dense_p_i: 0.1         # short-range / dense tail
  eval_in_n: 1000
  eval_sparse_n: 100000
  eval_dense_n: 3000
  eval_seed: 1

training:
  lr: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.999
  warmup_steps: 50
  train_steps: 10000
  decay_end_step: 10001       # LR hits 0 at this step (paper convention)
  batch_size: 16
  seed: 0
  eval_every: 500
  training_eval_subset: 1000  # paper: "first 1% of (ii)" during training
  log_every: 50
  save_every: 2000
  eval_batch_size: 64
  device: auto

output:
  out_dir: results/flip_flop/baseline
